<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stripe Payment Example</title>
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <h1>Stripe Payment Example</h1>
  <form id="payment-form">
    <div>
      <label for="amount">Amount (in cents):</label>
      <input type="number" id="amount" name="amount" required>
    </div>
    <div>
      <label for="card-element">Card details:</label>
      <div id="card-element"></div>
    </div>
    <button type="submit">Pay</button>
  </form>

  <div id="payment-result"></div>

  <script>
    // Create a Stripe client
    const stripe = Stripe('pk_test_51NqMsNDCCswOCxLks4dHZ5jTsQlkkvVvdJXzaE4D51OExEk5BcCWWMLX4uA2TEFT2poGAcLyIBgLl0sq6vsRKqLW00Uf2cEURO');

    // Create an instance of Elements
    const elements = stripe.elements();

    // Create an instance of the card Element
    const card = elements.create('card');

    // Add the card Element to the card-element div
    card.mount('#card-element');

    // Handle form submission
    const form = document.getElementById('payment-form');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const { token, error } = await stripe.createToken(card);

      if (error) {
        // Display error message
        document.getElementById('payment-result').innerText = `Error: ${error.message}`;
      } else {
        // Send the token to your server
        const response = await fetch('/charge', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            amount: document.getElementById('amount').value,
            token: token,
          }),
        });

        const data = await response.json();
        // Display the server's response
        document.getElementById('payment-result').innerText = data.message;
      }
    });
  </script>
</body>
</html>
